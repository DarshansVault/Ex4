services:
  blue:
    image: nginx:alpine
    ports:
      - "8081:8081"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./blue:/usr/share/nginx/html/blue
      - ./green:/usr/share/nginx/html/green
      - ./red:/usr/share/nginx/html/red

  green:
    image: nginx:alpine
    ports:
      - "8082:8082"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./blue:/usr/share/nginx/html/blue
      - ./green:/usr/share/nginx/html/green
      - ./red:/usr/share/nginx/html/red

  red:
    image: nginx:alpine
    ports:
      - "8083:8083"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./blue:/usr/share/nginx/html/blue
      - ./green:/usr/share/nginx/html/green
      - ./red:/usr/share/nginx/html/red
